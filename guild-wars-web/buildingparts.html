<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guild Wars — Block Building Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #2a2f33; overflow: hidden; font-family: Arial, sans-serif; }
    canvas { display: block; }
    #hud { position: fixed; top: 8px; left: 10px; color: #cdd; font-size: 12px; z-index: 2; text-shadow: 0 1px 2px #000; }
    #regen-btn {
      position: fixed; top: 8px; right: 10px; z-index: 2;
      padding: 5px 12px; font-size: 12px; font-family: Arial, sans-serif;
      background: #3a5f3a; color: #cee; border: 1px solid #5a9f5a;
      border-radius: 4px; cursor: pointer;
    }
    #regen-btn:hover { background: #4a7f4a; }
    #regen-btn:active { background: #2a4f2a; }
  </style>
</head>
<body>
  <div id="hud">Loading block preview…</div>
  <button id="regen-btn" onclick="window._regenBuildings?.()">Regenerate Buildings</button>
  <script type="module" src="/client/preview/blockpreview.js"></script>
</body>
</html>
