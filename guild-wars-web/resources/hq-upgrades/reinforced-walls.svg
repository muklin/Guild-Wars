<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" width="200" height="140">
  <rect width="200" height="140" fill="#f8f6f0"/>
  <g stroke="#1a1210" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Battlements -->
    <rect x="52" y="42" width="14" height="14" stroke-width="1.8"/>
    <rect x="72" y="42" width="14" height="14" stroke-width="1.8"/>
    <rect x="92" y="42" width="14" height="14" stroke-width="1.8"/>
    <rect x="112" y="42" width="14" height="14" stroke-width="1.8"/>
    <rect x="132" y="42" width="14" height="14" stroke-width="1.8"/>
    <!-- Main wall body -->
    <rect x="52" y="56" width="96" height="46" stroke-width="2"/>
    <!-- Stone block horizontal lines -->
    <line x1="52" y1="71" x2="148" y2="71" stroke-width="1.2"/>
    <line x1="52" y1="86" x2="148" y2="86" stroke-width="1.2"/>
    <!-- Stone block vertical lines upper row -->
    <line x1="90" y1="56" x2="90" y2="71" stroke-width="1"/>
    <line x1="128" y1="56" x2="128" y2="71" stroke-width="1"/>
    <!-- Stone block vertical lines middle row -->
    <line x1="72" y1="71" x2="72" y2="86" stroke-width="1"/>
    <line x1="110" y1="71" x2="110" y2="86" stroke-width="1"/>
    <line x1="138" y1="71" x2="138" y2="86" stroke-width="1"/>
    <!-- Stone block vertical lines lower row -->
    <line x1="88" y1="86" x2="88" y2="102" stroke-width="1"/>
    <line x1="124" y1="86" x2="124" y2="102" stroke-width="1"/>
    <!-- Ground line -->
    <line x1="44" y1="102" x2="156" y2="102" stroke-width="1.5"/>
    <!-- Shading on battlements -->
    <line x1="60" y1="44" x2="60" y2="54" stroke-width="0.6" opacity="0.3"/>
    <line x1="80" y1="44" x2="80" y2="54" stroke-width="0.6" opacity="0.3"/>
    <line x1="100" y1="44" x2="100" y2="54" stroke-width="0.6" opacity="0.3"/>
    <line x1="120" y1="44" x2="120" y2="54" stroke-width="0.6" opacity="0.3"/>
    <line x1="140" y1="44" x2="140" y2="54" stroke-width="0.6" opacity="0.3"/>
  </g>
</svg>
