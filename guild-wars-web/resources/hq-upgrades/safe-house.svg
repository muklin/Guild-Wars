<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" width="200" height="140">
  <rect width="200" height="140" fill="#f8f6f0"/>
  <g stroke="#1a1210" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- House walls -->
    <rect x="56" y="72" width="88" height="38" stroke-width="2"/>
    <!-- Roof -->
    <path d="M48 72 L100 38 L152 72" stroke-width="2"/>
    <!-- Door -->
    <rect x="88" y="88" width="18" height="22" stroke-width="1.5"/>
    <path d="M88 88 Q97 82 106 88" stroke-width="1.2"/>
    <!-- Window left -->
    <rect x="62" y="80" width="18" height="14" stroke-width="1.2"/>
    <line x1="71" y1="80" x2="71" y2="94" stroke-width="0.8"/>
    <line x1="62" y1="87" x2="80" y2="87" stroke-width="0.8"/>
    <!-- Window right -->
    <rect x="120" y="80" width="18" height="14" stroke-width="1.2"/>
    <line x1="129" y1="80" x2="129" y2="94" stroke-width="0.8"/>
    <line x1="120" y1="87" x2="138" y2="87" stroke-width="0.8"/>
    <!-- Padlock on door -->
    <rect x="93" y="96" width="8" height="7" stroke-width="1.2"/>
    <path d="M95 96 Q95 91 97 91 Q99 91 99 96" stroke-width="1"/>
    <!-- Ground -->
    <line x1="44" y1="110" x2="156" y2="110" stroke-width="1.5"/>
    <!-- Chimney -->
    <rect x="118" y="46" width="10" height="20" stroke-width="1.3"/>
    <!-- Smoke wisps -->
    <path d="M121 44 Q119 38 122 32" stroke-width="0.9" opacity="0.5"/>
    <path d="M125 44 Q128 37 125 31" stroke-width="0.9" opacity="0.5"/>
  </g>
</svg>
