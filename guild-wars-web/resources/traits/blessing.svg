<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" width="200" height="140">
  <rect width="200" height="140" fill="#f8f6f0"/>
  <g stroke="#1a1210" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Divine rays from above -->
    <path d="M100 10 L100 128" stroke-width="1.6"/>
    <path d="M86 14 L72 128" stroke-width="1.3" opacity="0.6"/>
    <path d="M114 14 L128 128" stroke-width="1.3" opacity="0.6"/>
    <path d="M72 18 L48 128" stroke-width="1" opacity="0.4"/>
    <path d="M128 18 L152 128" stroke-width="1" opacity="0.4"/>
    <path d="M58 24 L28 128" stroke-width="0.8" opacity="0.25"/>
    <path d="M142 24 L172 128" stroke-width="0.8" opacity="0.25"/>
    <!-- Radiant source / sun shape at top -->
    <circle cx="100" cy="18" r="12" stroke-width="1.6"/>
    <!-- Sun inner -->
    <circle cx="100" cy="18" r="6" stroke-width="1.1" opacity="0.6"/>
    <!-- Sun cross inside -->
    <path d="M100 12 L100 24 M94 18 L106 18" stroke-width="1.2" opacity="0.5"/>
    <!-- Divine cross / holy symbol in beam -->
    <path d="M100 52 L100 82" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M86 62 L114 62" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Halo ring around cross centre -->
    <circle cx="100" cy="62" r="20" stroke-width="1" opacity="0.35"/>
    <circle cx="100" cy="62" r="28" stroke-width="0.7" opacity="0.2"/>
    <!-- Descending light particles -->
    <circle cx="84" cy="42" r="1.5" opacity="0.5"/>
    <circle cx="116" cy="42" r="1.5" opacity="0.5"/>
    <circle cx="76" cy="56" r="1" opacity="0.4"/>
    <circle cx="124" cy="56" r="1" opacity="0.4"/>
    <circle cx="72" cy="70" r="1.5" opacity="0.35"/>
    <circle cx="128" cy="70" r="1.5" opacity="0.35"/>
    <circle cx="62" cy="86" r="1" opacity="0.3"/>
    <circle cx="138" cy="86" r="1" opacity="0.3"/>
    <!-- Ground / figure receiving blessing (silhouette) -->
    <path d="M88 128 Q88 114 100 110 Q112 114 112 128" stroke-width="1.4"/>
    <circle cx="100" cy="104" r="8" stroke-width="1.4"/>
    <!-- Glow dots on figure -->
    <path d="M94 96 L96 92 M100 94 L100 90 M106 96 L104 92" stroke-width="0.9" opacity="0.5"/>
  </g>
</svg>
